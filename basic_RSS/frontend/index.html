<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuratePro - AI Content Curator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f5f7; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0073b1; margin-top: 0; }
        label { display: block; margin: 12px 0 6px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #0073b1; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005582; }
        .output-box { margin-top: 25px; padding: 15px; background: #eef3f8; border-left: 5px solid #0073b1; border-radius: 4px; display: none; white-space: pre-wrap; }
        .loading { display: none; color: #666; font-style: italic; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>CuratePro - AI Content Curator</h2>
    
    <label for="feedUrl">RSS Feed URL</label>
    <input type="text" id="feedUrl" value="https://techcrunch.com/feed/" placeholder="Paste RSS feed link here...">
    
    <label for="toneSelect">Select Post Tone</label>
    <select id="toneSelect">
        <option value="Professional & Insightful">Professional & Insightful</option>
        <option value="Casual & Conversational">Casual & Conversational</option>
        <option value="Bold & Hype">Bold & Hype</option>
        <option value="Educational & Detailed">Educational & Detailed</option>
    </select>
    
    <button onclick="generatePost()">Generate Draft</button>
    
    <div id="loadingStatus" class="loading">Fetching latest article and working with Gemini...</div>
    
    <div id="output" class="output-box"></div>
</div>

<script>
    async function generatePost() {
        const feedUrl = document.getElementById('feedUrl').value;
        const tone = document.getElementById('toneSelect').value;
        const outputDiv = document.getElementById('output');
        const loadingDiv = document.getElementById('loadingStatus');
        
        outputDiv.style.display = "none";
        loadingDiv.style.display = "block";
        
        try {
            const response = await fetch('/api/curate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ feed_url: feedUrl, tone: tone })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                outputDiv.innerHTML = `<strong>Article:</strong> ${data.title}\n<hr style="border:0;border-top:1px solid #ccc;">\n${data.draft}\n\n<strong>Source:</strong> ${data.source_link}`;
                outputDiv.style.display = "block";
            } else {
                alert("Error: " + data.detail);
            }
        } catch (err) {
            alert("Could not connect to the backend server. Make sure main.py is running!");
        } finally {
            loadingDiv.style.display = "none";
        }
    }
</script>

</body>
</html>
